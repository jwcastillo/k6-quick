# golangci-lint v2.10.1
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - whitespace
    - revive
    - gosec
    - lll
    - funlen
    - gochecknoglobals
    - nolintlint
  settings:
    errcheck:
      # CLI output to stdout/stderr — write errors are not actionable
      exclude-functions:
        - fmt.Fprintln
        - fmt.Fprintf
        - fmt.Fprint
    lll:
      line-length: 120
    funlen:
      lines: 120
      statements: 90
  exclusions:
    rules:
      - path: '_test\.go'
        linters:
          - funlen
          - gosec
          - gochecknoglobals
          - errcheck
      - path: 'main\.go'
        linters:
          - gochecknoglobals
      # Reading user-specified summary files is this tool's purpose
      - linters: [gosec]
        text: "G304|G703|G705"

formatters:
  enable:
    - gofmt
    - gofumpt
    - goimports
