# golangci-lint v2.10.1
version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - misspell
    - whitespace
    - gofmt
    - goimports
    - gofumpt
    - revive
    - gosec
    - lll
    - funlen
    - gochecknoglobals
    - nolintlint

linters-settings:
  lll:
    line-length: 120
  funlen:
    lines: 80
    statements: 60

issues:
  exclude-rules:
    - path: "_test\\.go"
      linters:
        - funlen
        - gosec
    - path: "cmd/"
      linters:
        - gochecknoglobals
